<ion-content [fullscreen]="true">
  <div class="page-layout">
    <h3 class="page-title">Avisos<br>
      <small>Quadro de avisos institucionais</small>
    </h3>

    <ion-button class="btn-add" (click)="handleTable({action: 'new'})">
      <i class="mdi mdi-plus"></i>
      <span class="text"> Novo Aviso</span>
    </ion-button>

    <div class="content">
      <div class="card">
        <div class="card-body">
          <data-table *ngIf="tableInfo" [tableInfo]="tableInfo" [reload]="reloadTable"
            (clickEvent)="handleTable($event)"></data-table>
        </div>
      </div>
    </div>
  </div>
</ion-content>

<ion-modal id="modalNotice" #modalNotice>
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-buttons slot="start">
          <ion-button (click)="closeModal()">{{i18n.lang.CANCEL}}</ion-button>
        </ion-buttons>
        <ion-buttons slot="end">
          <ion-button (click)="saveForm()" [strong]="true">{{i18n.lang.CONFIRM}}</ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>

    <ion-content class="ion-padding">
      <form #NoticeForm="ngForm" novalidate>
        <input type="hidden" name="_id" ngModel>

        <div class="section">
          <h4 class="section-title">Conteúdo</h4>
          <div class="section-body">
            <ion-row>

              <ion-col size="12">
                <ion-item>
                  <ion-label for="title" position="stacked">Título*</ion-label>
                  <ion-input type="text" name="title" ngModel required></ion-input>
                </ion-item>
              </ion-col>

              <ion-col size="12">
                <ion-item>
                  <ion-label for="subtitle" position="stacked">Subtítulo</ion-label>
                  <ion-input type="text" name="subtitle" ngModel></ion-input>
                </ion-item>
              </ion-col>

              <ion-col size="12">
                <ion-item>
                  <ion-label for="text" position="stacked">Texto</ion-label>
                  <ion-textarea name="text" ngModel rows="4" auto-grow="true"></ion-textarea>
                </ion-item>
              </ion-col>

              <ion-col size="12">
                <ion-item>
                  <ion-label for="image_url" position="stacked">URL da Imagem</ion-label>
                  <ion-input type="url" name="image_url" ngModel></ion-input>
                </ion-item>
              </ion-col>

            </ion-row>
          </div>
        </div>

        <div class="section">
          <h4 class="section-title">Publicação</h4>
          <div class="section-body">
            <ion-row>

              <ion-col size-xs="12" size-md="6">
                <ion-item>
                  <ion-label for="start_at" position="stacked">Data de Início</ion-label>
                  <ion-input type="date" name="start_at" ngModel></ion-input>
                </ion-item>
              </ion-col>

              <ion-col size-xs="12" size-md="6">
                <ion-item>
                  <ion-label for="end_at" position="stacked">Data de Encerramento</ion-label>
                  <ion-input type="date" name="end_at" ngModel></ion-input>
                </ion-item>
              </ion-col>

              <ion-col size-xs="12" size-md="6">
                <ion-item>
                  <ion-label>Publicado</ion-label>
                  <ion-toggle name="published" ngModel></ion-toggle>
                </ion-item>
              </ion-col>

              <ion-col size-xs="12" size-md="6">
                <ion-item>
                  <ion-label>Fixar no topo</ion-label>
                  <ion-toggle name="pinned" ngModel></ion-toggle>
                </ion-item>
              </ion-col>

            </ion-row>
          </div>
        </div>

      </form>
    </ion-content>
  </ng-template>
</ion-modal>
