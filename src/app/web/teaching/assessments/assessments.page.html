<ion-content [fullscreen]="true">
  <div class="page-layout">
    <h3 class="page-title">Avaliações<br>
      <small>Gerenciamento de avaliações</small>
    </h3>

    <ion-button class="btn-add" (click)="handleTable({action: 'new'})">
      <i class="mdi mdi-plus"></i>
      <span class="text"> Nova Avaliação</span>
    </ion-button>

    <div class="content">
      <div class="card">
        <div class="card-body">
          <data-table *ngIf="tableInfo" [tableInfo]="tableInfo" [reload]="reloadTable"
            (clickEvent)="handleTable($event)"></data-table>
        </div>
      </div>
    </div>
  </div>
</ion-content>

<ion-modal id="modalAssessment" #modalAssessment>
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-buttons slot="start">
          <ion-button (click)="closeModal()">{{i18n.lang.CANCEL}}</ion-button>
        </ion-buttons>
        <ion-buttons slot="end">
          <ion-button (click)="saveForm()" [strong]="true">{{i18n.lang.CONFIRM}}</ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>
    <ion-content class="ion-padding">
      <form #AssessmentForm="ngForm" novalidate>
        <input type="hidden" name="_id" ngModel>
        <div class="section">
          <h4 class="section-title">Avaliação</h4>
          <div class="section-body">
            <ion-row>
              <ion-col size-xs="12" size-md="8">
                <ion-item>
                  <ion-label position="stacked">Título*</ion-label>
                  <ion-input type="text" name="title" ngModel required></ion-input>
                </ion-item>
              </ion-col>
              <ion-col size-xs="12" size-md="4">
                <ion-item>
                  <ion-label position="stacked">Tipo</ion-label>
                  <ion-select name="type" ngModel>
                    <ion-select-option value="prova">Prova</ion-select-option>
                    <ion-select-option value="trabalho">Trabalho</ion-select-option>
                    <ion-select-option value="atividade">Atividade</ion-select-option>
                  </ion-select>
                </ion-item>
              </ion-col>
              <ion-col size-xs="12" size-md="6">
                <ion-item>
                  <ion-label position="stacked">Data</ion-label>
                  <ion-input type="date" name="date" ngModel></ion-input>
                </ion-item>
              </ion-col>
              <ion-col size-xs="12" size-md="6">
                <ion-item>
                  <ion-label position="stacked">Nota Máxima</ion-label>
                  <ion-input type="number" name="max_score" ngModel></ion-input>
                </ion-item>
              </ion-col>
              <ion-col size="12">
                <ion-item>
                  <ion-label position="stacked">Descrição</ion-label>
                  <ion-textarea name="description" ngModel rows="3" auto-grow="true"></ion-textarea>
                </ion-item>
              </ion-col>
            </ion-row>
          </div>
        </div>
      </form>
    </ion-content>
  </ng-template>
</ion-modal>
